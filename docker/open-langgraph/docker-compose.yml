services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: open_langgraph
      POSTGRES_PASSWORD: open_langgraph_secret
      POSTGRES_DB: open_langgraph
    ports:
      - "6000:5432"
    volumes:
      - open_langgraph_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_langgraph -d open_langgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - open_langgraph_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  open-langgraph:
    build:
      context: ../..
      dockerfile: docker/open-langgraph/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - path: ../../.env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://open_langgraph:open_langgraph_secret@postgres:5432/open_langgraph
      - REDIS_URL=redis://redis:6379/0
      - AUTH_TYPE=noop
      - DEBUG=true
      - PORT=8000
      # Single-instance pilot: skip the Redis-backed rate limiter entirely.
      - RATE_LIMIT_ENABLED=false
      # Containers can't reach the host's `localhost`; LM Studio (or any
      # local OpenAI-compatible server) runs on the host, not in this network.
      - OPENAI_BASE_URL=http://host.docker.internal:1234/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  open_langgraph_postgres_data:
  open_langgraph_redis_data:
